# Основной язык сайта (русский)
defaultContentLanguage = "ru"

# Базовый URL сайта
baseURL = "https://prs2rnn.github.io/"

publishDir = "docs"
theme = "hugo-bearneo"

enableRobotsTXT = true
disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]

[permalinks]
    blog = "/p/:slug"
    tags = "/blog/:slug"

[minify]
    disableHTML = false
    disableCSS = false
    disableJS = false

[sitemap]
    changefreq = 'monthly'
    priority = 0.5
    filename = 'sitemap.xml'

[markup.goldmark.renderer]
    unsafe = true

[markup.highlight]
    style = 'original'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true

# Конфигурация для русского языка (по умолчанию)
[languages.ru]
    languageCode = "ru-ru"
    title = "🕸"
    author = "Андрей Пересторонин"
    weight = 1

    [languages.ru.params]
        description = "Blog"
        favicon = "images/favicon.png"
        images = ["images/share.png"]
        dateFormat = "02.01.2006"
        copyright = "Copyright © 2026, prs2rnn."
        groupByYear = true
        postSearch = true
        toc = true
        imageZoom = true

        [languages.ru.params.footer]
            hideCopyright = false
            hideSitemap = false
            hideMadeWithLine = true
            hideRSSAndEmail = false

        [languages.ru.params.RSS]
            enableRSS = true
            pageLimit = 10

        [languages.ru.params.author]
            name = "Андрей Пересторонин"

# Конфигурация для английского языка
[languages.en]
    languageCode = "en-us"
    title = "🕸"
    author = "Andrey Perestoronin"
    weight = 2
    contentDir = "content/en"

    [languages.en.params]
        description = "Blog"
        favicon = "images/favicon.png"
        images = ["images/share.png"]
        dateFormat = "2006-01-02"  # Английский формат даты
        copyright = "Copyright © 2026, prs2rnn."
        groupByYear = true
        postSearch = true
        toc = true
        imageZoom = true
        showPostCount = true

        [languages.en.params.footer]
            hideCopyright = false
            hideSitemap = false
            hideMadeWithLine = true
            hideRSSAndEmail = false

        [languages.en.params.RSS]
            enableRSS = true
            pageLimit = 10

        [languages.en.params.author]
            name = "Andrey Perestoronin"

# Меню для русского языка (добавлена ссылку на английскую версию)
[[languages.ru.menu.main]]
    name = "En"
    url = "/en/"
    weight = 5

# Меню для английского языка
[[languages.en.menu.main]]
    name = "Home"
    url = "/en/"
    weight = 1

[[languages.en.menu.main]]
    name = "Blog"
    url = "/en/blog/"
    weight = 2

[[languages.en.menu.main]]
    name = "Ru"
    url = "/"
    weight = 3
